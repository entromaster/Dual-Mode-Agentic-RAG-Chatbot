version: "3.9"

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATASET_PATH=/app/Dataset
      - STATIC_DIR=/app/static
    volumes:
      - chroma_data:/app/chroma_data
    restart: unless-stopped

volumes:
  chroma_data:
